name: Build

on:
  push:
    branches: [ "master" ]
    tags: [ '*' ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Upload binary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-awg-config-decoder
          path: target/release/awg-config-decoder${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Ubuntu binary
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-latest-awg-config-decoder
          path: artifacts/ubuntu

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: windows-latest-awg-config-decoder
          path: artifacts/windows

      - name: Stage release assets
        run: |
          mkdir -p release
          cp artifacts/ubuntu/awg-config-decoder release/awg-config-decoder-ubuntu
          cp artifacts/windows/awg-config-decoder.exe release/awg-config-decoder-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
